services:
  mysql:
    image: mysql:8.1               # 指定 MySQL 8.0 稳定版镜像
    container_name: mysql-server
    restart: always                # 生产环境强制自动重启
    ports:
      - "3306:3306"                # 映射宿主机 3306 端口到容器 3306
    environment:
      MYSQL_ROOT_PASSWORD: HGp0dakfm8VQyQBdkFHHrdoacVeSMF  # 🔥 请修改为你自己的强密码
      MYSQL_DATABASE: hbjxh_com                  # 容器启动时自动创建的初始数据库名（可选）
      TZ: Asia/Shanghai                             # 设置容器时区为东八区
    command: 
      - --default-authentication-plugin=mysql_native_password # 💡 兼容老版本客户端的密码验证插件
      - --character-set-server=utf8mb4                        # 强制使用 utf8mb4 字符集（支持Emoji和完整中文）
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data:/var/lib/mysql      # 🔥 核心：数据持久化挂载，确保容器删除后数据不丢失
      - ./my.cnf:/etc/mysql/conf.d/my.cnf # 挂载自定义配置文件（可选）
    logging:
      driver: "json-file"
      options:
        max-size: "10m"            # 限制日志大小，防止撑爆磁盘
        max-file: "3"
  phpmyadmin:
    image: phpmyadmin:latest       # 使用官方最新版镜像
    container_name: phpmyadmin-web
    restart: always
    ports:
      - "9999:80"                  # 💡 映射宿主机的 8080 端口到 phpMyAdmin 网页
    environment:
      PMA_HOST: mysql              # 🔥 核心：让 phpMyAdmin 知道 MySQL 的容器名叫什么
      PMA_PORT: 3306               # MySQL 端口
      TZ: Asia/Shanghai
    depends_on:
      - mysql                      # 确保 MySQL 容器先启动，phpMyAdmin 后启动
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"